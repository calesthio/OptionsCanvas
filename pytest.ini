[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for different test types
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, multi-component)
    property: Property-based tests (hypothesis)
    simulation: Simulation tests (very slow)
    slow: Slow-running tests

# Coverage settings
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=assisted_trading/backend
    --cov-report=html:tests/reports/coverage
    --cov-report=term-missing

# Hypothesis profiles
[hypothesis]
profile = default

# Default profile
[profile:default]
max_examples = 100
deadline = 1000

# CI profile (faster)
[profile:ci]
max_examples = 10
deadline = 500

# Thorough profile (nightly)
[profile:thorough]
max_examples = 10000
deadline = 5000
